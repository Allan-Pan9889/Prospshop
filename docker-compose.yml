services:
  postgres:
    image: postgres:16-alpine
    container_name: prospshop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prospshop
      POSTGRES_PASSWORD: prospshop
      POSTGRES_DB: prospshop
    ports:
      - "5432:5432"
    volumes:
      - prospshop_pgdata:/var/lib/postgresql/data

volumes:
  prospshop_pgdata:
